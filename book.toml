[book]
authors = ["Zack Grannan"]
language = "en"
multilingual = false
src = "src"
title = "PCG Documentation"

[preprocessor.defn]
command = "node preprocessors/defn.js"
after = ["links"]
before = ["katex"]

[preprocessor.katex]
after = ["links"]
macros = "macros.txt"
trust = true

[preprocessor.hypergraph]
command = "node preprocessors/hypergraph.js"

[output.html]
mathjax-support = true
additional-css = ["theme/custom.css"]
additional-js = ["theme/hypergraph.js"]
