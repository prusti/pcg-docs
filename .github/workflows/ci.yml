name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Build project
      run: npm run build:js

  lint:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

  lean:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@v3

    - name: Install elan
      run: |
        curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Install Rust (self-hosted runners only)
      if: vars.RUNNER != ''
      run: |
        if ! command -v cargo >/dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
        fi
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Install LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-pictures texlive-science latexmk

    - name: Cache Lake packages
      uses: actions/cache@v3
      with:
        path: formalization/.lake
        key: ${{ runner.os }}-lean-${{ hashFiles('formalization/lean-toolchain', 'formalization/lakefile.lean') }}

    - name: Build Lean formalization
      # Fails the build if Lean's linter reports an unused simp
      # argument anywhere in the project — those warnings indicate
      # a stale `simp only [...]` term that should be pruned. The
      # `set -o pipefail` keeps the original `lake build` exit
      # code visible through the `tee` pipe; the grep that follows
      # turns the targeted warning into a hard failure.
      working-directory: formalization
      run: |
        set -o pipefail
        lake build 2>&1 | tee build.log
        if grep -q "This simp argument is unused" build.log; then
          echo "::error::unused simp argument(s) detected — \
            prune the offending term from the simp list"
          exit 1
        fi

    - name: Check banned source patterns
      # Walks elaborated `Expr` trees of every user-package decl
      # and reports forbidden constructor / call patterns
      # (`Latex.cmd "href"` outside `Latex.externalLink`,
      # `MathDoc.doc (Doc.plain s)` outside `MathDoc.text`).
      # Replaces the older `scripts/check_banned_patterns.sh`.
      working-directory: formalization
      run: |
        lake exe check_banned_patterns \
          Core MIR OpSem PCG Presentation Properties Runtime Tests

    - name: Export and build generated Lean project
      working-directory: formalization
      run: lake exe lean_export

    - name: Export Rust crate
      working-directory: formalization
      run: lake exe rust_export

    - name: Export presentation and build PDF
      # `presentation_export` runs `latexmk` and then inspects
      # the LaTeX log — any overfull `\hbox` warning causes
      # the step to fail so CI catches layout regressions.
      working-directory: formalization
      run: lake exe presentation_export

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Check generated Rust crate compiles
      working-directory: formalization/generated/rust
      run: cargo check

    - name: Check RuntimeRust source crate (fmt + clippy pedantic)
      # `RuntimeRust/` is the hand-written source-of-truth crate
      # copied into `generated/rust/formal-runtime/` at export
      # time. Its `lib.rs` declares `#![deny(clippy::pedantic)]`
      # and the project relies on rustfmt-clean signatures, but
      # `rust_export` runs `cargo fmt --all` (no `--check`) on the
      # *generated* tree only — so without this gate, formatting
      # or pedantic-clippy regressions in the source would land
      # silently.
      working-directory: formalization/RuntimeRust
      run: |
        cargo fmt --check
        cargo clippy --all-targets -- -D warnings

    - name: Upload presentation PDF
      uses: actions/upload-artifact@v4
      with:
        name: presentation
        path: formalization/generated/presentation.pdf
