name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Build project
      run: npm run build:js

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

  lean:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install elan
      run: |
        curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Cache Lake packages
      uses: actions/cache@v3
      with:
        path: formalization/.lake
        key: ${{ runner.os }}-lean-${{ hashFiles('formalization/lean-toolchain', 'formalization/lakefile.lean') }}

    - name: Build Lean formalization
      working-directory: formalization
      run: lake build

    - name: Export Rust crate
      working-directory: formalization
      run: lake exe pcg_export

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Check generated Rust crate compiles
      working-directory: formalization/generated/rust
      run: cargo check

