name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Run tests with coverage
      run: npm run test:coverage

    - name: Build project
      run: npm run build:js

  lint:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

  lean:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@v3

    - name: Install elan
      run: |
        curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Install LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-pictures texlive-science latexmk

    - name: Cache Lake packages
      uses: actions/cache@v3
      with:
        path: formalization/.lake
        key: ${{ runner.os }}-lean-${{ hashFiles('formalization/lean-toolchain', 'formalization/lakefile.lean') }}

    - name: Build Lean formalization
      working-directory: formalization
      run: lake build

    - name: Export and build generated Lean project
      working-directory: formalization
      run: lake exe lean_export

    - name: Export Rust crate
      working-directory: formalization
      run: lake exe rust_export

    - name: Export presentation and build PDF
      working-directory: formalization
      run: lake exe presentation_export

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Check generated Rust crate compiles
      working-directory: formalization/generated/rust
      run: cargo check

    - name: Upload presentation PDF
      uses: actions/upload-artifact@v4
      with:
        name: presentation
        path: formalization/generated/presentation.pdf
